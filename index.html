<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #startButton {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; 
            justify-content: center; align-items: center;
            z-index: 9999; cursor: pointer; text-align: center;
        }
    </style>
</head>
<body>
    <div id="startButton"><h1>Тисни сюди і наводь камеру</h1></div>

    <a-scene mindar-image="imageTargetSrc: https://banya9th-cell.github.io/AR-magic.racio/targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="ar-video" src="https://www.w3schools.com/html/mov_bbb.mp4" 
                preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#ar-video" width="1" height="0.75" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.getElementById('startButton');
        const video = document.getElementById('ar-video');
        startButton.addEventListener('click', () => {
            video.play(); // Запускаємо відео
            startButton.style.display = 'none';
        });
    </script>
</body>
</html>
