<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center; font-family: sans-serif;">
        <h1>📽️ YouTube AR 📽️</h1>
        <p>Натисни, щоб активувати камеру</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
             cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        
        <a-assets>
            <img id="yt-icon" src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" />
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-image src="#yt-icon" 
                     class="clickable" 
                     width="1" height="0.4" 
                     position="0 0 0.1" 
                     id="youtube-button"></a-image>
            
            <a-text value="WATCH ON YOUTUBE" color="white" align="center" position="0 -0.3 0.1" scale="0.4 0.4 0.4"></a-text>
        </a-entity>
    </a-scene>

    <script>
        const overlay = document.getElementById('overlay');
        const ytButton = document.getElementById('youtube-button');

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
        });

        // Обробник кліку по кнопці в AR
        ytButton.addEventListener('click', () => {
            window.location.href = "https://www.youtube.com/shorts/d8QBGc3ZqC4";
        });
    </script>
</body>
</html>
