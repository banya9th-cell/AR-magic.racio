<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center;">
        <h1>📽️ ТИСНИ ДЛЯ СТАРТУ</h1>
        <p>Після натискання наводь на маркер</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">
        
        <a-assets>
            <img id="yt-icon" src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" />
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-image 
                id="youtube-button"
                src="#yt-icon" 
                class="clickable" 
                width="1" height="0.4" 
                position="0 0 0.1"
                animation__mouseenter="property: scale; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter"
                animation__mouseleave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
            </a-image>
            
            <a-plane class="clickable" opacity="0" width="1" height="0.4" position="0 0 0.12"></a-plane>

            <a-text value="CLICK TO OPEN SHORTS" color="red" align="center" position="0 -0.4 0.1" scale="0.5 0.5 0.5"></a-text>
        </a-entity>
    </a-scene>

    <script>
        const overlay = document.getElementById('overlay');
        const ytButton = document.getElementById('youtube-button');

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
        });

        // Спробуємо два типи подій для надійності
        const openLink = () => {
            console.log("Клік спрацював!");
            window.location.href = "https://www.youtube.com/shorts/d8QBGc3ZqC4";
        };

        ytButton.addEventListener('click', openLink);
        // Для деяких Android браузерів краще спрацьовує mousedown
        ytButton.addEventListener('mousedown', openLink);
    </script>
</body>
</html>
